baseURL = 'https://ufo2mstar.github.io/'
languageCode = 'en-us'
defaultContentLanguage = 'en'
title = 'Un Ltd.'

theme = 'blowfish'

# Hugo build settings
enableRobotsTXT = true
enableEmoji = true
summaryLength = 0
buildDrafts = false
buildFuture = false

# Carried from Jekyll _config.yml so blog post URLs stay stable.
[permalinks]
  blog = '/blog/:year/:month/:day/:slug/'

# Blowfish expects these taxonomies. We use 'tags' and 'categories'; the
# others are defined for theme compatibility but unused for now.
[taxonomies]
  tag = 'tags'
  category = 'categories'
  author = 'authors'
  series = 'series'

# Blowfish needs JSON output on the home page for its search index.
[outputs]
  home = ['HTML', 'RSS', 'JSON']

# Top nav. `pageRef` for Hugo content sections, `url` for static pages.
# Tags/Categories pages are auto-generated by Blowfish once posts exist;
# add menu entries for them after N2 (post migration) if we want them in the nav.
[menu]
  [[menu.main]]
    name = 'Blog'
    pageRef = '/blog'
    weight = 10
  [[menu.main]]
    name = 'About'
    pageRef = '/about'
    weight = 20
  [[menu.main]]
    name = 'Names'
    url = '/names/'
    weight = 30
  [[menu.main]]
    name = 'Resume'
    url = '/resume/'
    weight = 40

[pagination]
  pagerSize = 10

[sitemap]
  changefreq = 'daily'
  filename = 'sitemap.xml'
  priority = 0.5

# ---- Blowfish theme params ------------------------------------------------
# Full reference: https://blowfish.page/docs/configuration/
[params]
  # Visual theme - try 'ocean', 'slate', 'forest', 'fire', 'avocado', 'princess'
  colorScheme = 'ocean'
  defaultAppearance = 'auto'           # auto | light | dark
  autoSwitchAppearance = true
  enableSearch = true
  enableCodeCopy = true

  # Date format used by both our templates and Blowfish.
  # Hugo uses Go's reference date: Mon Jan 2 15:04:05 MST 2006
  # "2006-01-02"          -> 2026-04-20
  # "2006-01-02 15:04"    -> 2026-04-20 17:08
  # "January 2, 2006"     -> April 20, 2026
  dateFormat = '2006-01-02'

  # Header / footer copy
  description = 'web logs by this guy'
  showAppearanceSwitcher = true
  showScrollToTop = true

  [params.header]
    layout = 'basic'                   # basic | hamburger | hybrid | fixed | fixed-fill | fixed-fill-blur

  [params.footer]
    showCopyright = true
    showThemeAttribution = false       # we'll add 'powered by Hugo + Blowfish' once everything else is dialed in
    showAppearanceSwitcher = false
    showScrollToTop = true

  # Home page = Blowfish 'profile' layout (avatar + bio + recent posts).
  # The avatar is loaded from assets/avatar.png (Hugo will optimize it).
  [params.homepage]
    layout = 'profile'
    showRecent = true
    showRecentItems = 5
    showMoreLink = true
    showMoreLinkDest = '/blog'
    cardView = false

  # Author block shown on the profile homepage and post bylines.
  [params.author]
    name = 'Naren'
    image = 'avatar.png'
    headline = 'web logs by this guy'
    bio = 'Personal blog. Engineering, ideas, occasional rants.'
    links = [
      { github = 'https://github.com/ufo2mstar' },
      { twitter = 'https://twitter.com/ufo2m' },
      { linkedin = 'https://www.linkedin.com/in/narenss' },
      { email = 'mailto:narensst@gmail.com' },
      { rss = '/index.xml' },
    ]

  # Article defaults - shown on every blog post unless front matter overrides.
  [params.article]
    showDate = true
    showDateUpdated = false
    showAuthor = true
    showBreadcrumbs = true
    showDraftLabel = true
    showEdit = false
    showHeadingAnchors = true
    showPagination = true
    showReadingTime = true
    showTableOfContents = true
    showTaxonomies = true
    showWordCount = false
    sharingLinks = ['twitter', 'linkedin', 'reddit', 'email']

  # List pages (e.g. /blog/, /tags/foo/)
  [params.list]
    showHero = false
    showBreadcrumbs = true
    showSummary = true
    showTableOfContents = false
    showTaxonomies = true
    paginationWidth = 1

  # Single taxonomy term pages
  [params.taxonomy]
    showTermCount = true
