# Top navigation menu.
# Hugo ref: https://gohugo.io/configuration/menus/
#
# Note: this file is named menu.toml because Hugo auto-scopes files in
# config/_default/ whose basename matches a top-level config key. So
# `[[main]]` here is interpreted as `[[menu.main]]`. Strip the `menu.`
# prefix from any examples you copy from Hugo/Blowfish docs.
#
# `pageRef` for Hugo content sections; `url` for static/external pages.
# Tags/Categories pages auto-generated by Blowfish; add menu entries for
# them later if we want them in the nav.
#
# Names + Resume are static pages with no nav back to the site, so they
# open in a new tab via `newTab` (custom Blowfish theme override - see
# layouts/partials/header/components/{desktop,mobile}-menu.html).

[[main]]
  name = 'Blog'
  pageRef = '/blog'
  weight = 10

[[main]]
  name = 'About'
  pageRef = '/about'
  weight = 20

[[main]]
  name = 'Names'
  url = '/names/'
  weight = 30
  [main.params]
    newTab = true

[[main]]
  name = 'Resume'
  url = '/resume/'
  weight = 40
  [main.params]
    newTab = true
