# Top navigation menu.
# Hugo ref: https://gohugo.io/configuration/menus/
#
# Note: this file is named menu.toml because Hugo auto-scopes files in
# config/_default/ whose basename matches a top-level config key. So
# `[[main]]` here is interpreted as `[[menu.main]]`. Strip the `menu.`
# prefix from any examples you copy from Hugo/Blowfish docs.
#
# `pageRef` for Hugo content sections; `url` for static/external pages.

[[main]]
  name = 'Blog'
  pageRef = '/blog'
  weight = 10

[[main]]
  name = 'Categories'
  pageRef = '/categories'
  weight = 20

[[main]]
  name = 'More ···'
  pageRef = '/more'
  weight = 30

[[main]]
  name = 'About'
  pageRef = '/about'
  weight = 40
