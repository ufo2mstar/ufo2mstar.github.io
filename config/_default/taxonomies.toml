# Content taxonomies (singular -> plural mappings).
# Hugo ref: https://gohugo.io/configuration/taxonomies/
#
# Note: this file is named taxonomies.toml because Hugo auto-scopes
# files in config/_default/ whose basename matches a top-level config
# key. Strip the `taxonomies.` prefix from any examples you copy from
# Hugo docs.
#
# Blowfish expects all four to be defined even if unused.
# We only actively use 'tags' and 'categories' on posts.

tag = 'tags'
category = 'categories'
author = 'authors'
series = 'series'
