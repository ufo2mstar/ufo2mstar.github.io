<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickScript UI Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex flex-col font-sans">

    <header class="bg-gray-800 p-4 border-b border-gray-700 flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-tight">QuickScript Generator</h1>
        <div>
            <button class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded text-sm text-gray-300 transition">⚙️ Set API Key</button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        
        <aside class="w-1/3 bg-gray-800 p-6 flex flex-col border-r border-gray-700">
            <h2 class="text-lg font-semibold mb-4 text-gray-200">Describe Your Interface</h2>
            <p class="text-sm text-gray-400 mb-4">What public API are you trying to access, and what should the UI do?</p>
            
            <textarea 
                class="w-full flex-1 bg-gray-900 text-gray-100 p-4 rounded border border-gray-700 focus:outline-none focus:border-blue-500 resize-none transition" 
                placeholder="e.g., Build a UI with a text input for a city name. When I click search, call the OpenWeather API and display the temperature and humidity below..."
            ></textarea>
            
            <button class="mt-4 w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded transition shadow-lg">
                Generate UI ✨
            </button>
        </aside>

        <section class="w-2/3 bg-gray-900 flex flex-col relative">
            
            <div class="flex bg-gray-800 border-b border-gray-700 px-4 pt-2">
                <button class="px-6 py-2 text-sm font-medium text-blue-400 border-b-2 border-blue-400">Preview UI</button>
                <button class="px-6 py-2 text-sm font-medium text-gray-400 hover:text-gray-200 transition">View Code (Schema & Logic)</button>
            </div>

            <div class="flex-1 p-8 overflow-y-auto">
                <div class="max-w-md mx-auto bg-gray-800 p-6 rounded-lg border border-gray-700 shadow-2xl">
                    <p class="text-center text-gray-500 italic">Your generated interface will appear here...</p>
                </div>
            </div>

        </section>
    </main>

</body>
</html>
