<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickScript</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex flex-col font-sans overflow-hidden">

  <header class="bg-gray-800 px-4 py-3 border-b border-gray-700 flex justify-between items-center shrink-0">
    <h1 class="text-xl font-bold tracking-tight">QuickScript</h1>
    <button id="qs-settings-btn" class="bg-gray-700 hover:bg-gray-600 px-3 py-1.5 rounded text-sm text-gray-300 transition">Settings</button>
  </header>

  <main class="flex-1 flex overflow-hidden">

    <aside id="qs-sidebar" class="w-1/3 bg-gray-800 flex flex-col border-r border-gray-700 transition-all duration-150">
      <div class="flex justify-end p-1 border-b border-gray-700 shrink-0">
        <button id="qs-sidebar-toggle" class="px-2 py-0.5 text-gray-400 hover:text-gray-100 text-lg leading-none" title="Collapse sidebar">&lsaquo;</button>
      </div>
      <div id="qs-sidebar-body" class="flex-1 flex flex-col p-6 overflow-y-auto">
        <h2 class="text-lg font-semibold mb-2 text-gray-200">Describe Your Interface</h2>
        <p class="text-xs text-gray-500 mb-3">Coming in v2 - LLM-driven generation. For now, load a demo or open a saved script.</p>

        <textarea
          class="w-full h-32 bg-gray-900 text-gray-300 p-3 rounded border border-gray-700 text-sm resize-none mb-3 opacity-60"
          placeholder="e.g., Build a UI with a text input for a city name. When I click search, call the OpenWeather API and display the temperature..."
          disabled
        ></textarea>

        <button id="qs-generate-btn" class="w-full bg-blue-700 text-white font-medium py-2 rounded text-sm opacity-50 cursor-not-allowed mb-6" disabled title="Coming in v2">
          Generate UI (v2)
        </button>

        <div class="space-y-2">
          <button id="qs-load-demo" class="w-full bg-gray-700 hover:bg-gray-600 text-gray-100 py-2 rounded text-sm transition">
            Load demo: Format Converter
          </button>
          <button id="qs-open-file" class="w-full bg-gray-700 hover:bg-gray-600 text-gray-100 py-2 rounded text-sm transition">
            Open file...
          </button>
        </div>
      </div>
    </aside>

    <section class="flex-1 bg-gray-900 flex flex-col min-w-0">

      <div class="flex bg-gray-800 border-b border-gray-700 px-4 pt-2 items-end shrink-0">
        <button id="qs-tab-preview" class="px-6 py-2 text-sm font-medium text-blue-400 border-b-2 border-blue-400">Preview UI</button>
        <button id="qs-tab-code" class="px-6 py-2 text-sm font-medium text-gray-400 hover:text-gray-200 transition">Code View</button>
        <div class="flex-1"></div>
        <button id="qs-save-file" class="mb-1 px-3 py-1 text-xs bg-gray-700 hover:bg-gray-600 rounded text-gray-200 transition" title="Save current script as .qs.json">Save</button>
      </div>

      <div id="qs-pane-preview" class="flex-1 p-8 overflow-y-auto">
        <div id="qs-preview-mount"></div>
      </div>

      <div id="qs-pane-code" class="flex-1 p-4 overflow-y-auto flex-col gap-3" style="display:none">
        <div>
          <label class="block text-xs uppercase tracking-wide text-gray-500 mb-1">Schema (JSON)</label>
          <textarea id="qs-code-schema" rows="12" spellcheck="false" class="w-full bg-gray-950 text-gray-100 p-3 rounded border border-gray-700 font-mono text-xs resize-y focus:outline-none focus:border-blue-500"></textarea>
        </div>
        <div>
          <label class="block text-xs uppercase tracking-wide text-gray-500 mb-1">Logic (JavaScript)</label>
          <textarea id="qs-code-logic" rows="14" spellcheck="false" class="w-full bg-gray-950 text-gray-100 p-3 rounded border border-gray-700 font-mono text-xs resize-y focus:outline-none focus:border-blue-500"></textarea>
        </div>
        <div id="qs-code-error" class="text-xs text-red-400 min-h-[1rem]"></div>
      </div>

    </section>
  </main>

  <div id="qs-settings-modal" class="fixed inset-0 bg-black/60 items-center justify-center z-50" style="display:none">
    <div class="bg-gray-800 rounded-lg p-6 w-full max-w-md border border-gray-700 shadow-2xl">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-lg font-semibold">Settings</h3>
        <button id="qs-settings-close" class="text-gray-400 hover:text-gray-100 text-2xl leading-none" title="Close">&times;</button>
      </div>
      <div class="space-y-3">
        <div>
          <label class="block text-xs uppercase tracking-wide text-gray-500 mb-1">Provider</label>
          <select class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-sm">
            <option>OpenAI</option>
            <option>Anthropic</option>
            <option>Local</option>
          </select>
        </div>
        <div>
          <label class="block text-xs uppercase tracking-wide text-gray-500 mb-1">API Key</label>
          <input type="password" placeholder="sk-..." class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-sm font-mono">
        </div>
        <p class="text-xs text-gray-500">Mock UI for now. v2 will wire this to live LLM calls and store the key in localStorage.</p>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
